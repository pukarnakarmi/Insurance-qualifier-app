<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Delivery Countdown</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="card">
    <h1>Baby Delivery Countdown</h1>
    <p class="meta">Expected delivery date: <strong id="dueDate"></strong></p>
    <p class="meta">Today: <strong id="todayDate"></strong></p>
    <label class="meta" for="dueDateInput">
      Edit delivery date:
      <input type="date" id="dueDateInput" />
    </label>

    <section class="countdown" aria-live="polite">
      <div class="box"><span id="months">0</span><small>Months</small></div>
      <div class="box"><span id="weeks">0</span><small>Weeks</small></div>
      <div class="box"><span id="days">0</span><small>Days</small></div>
    </section>

    <p id="totalDays" class="summary"></p>
    <p id="pregnancyAge" class="summary"></p>
  </main>

  <script src="./script.js"></script>
</body>
</html>
